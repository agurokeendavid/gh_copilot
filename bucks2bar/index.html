<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bucks2Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell container py-4 py-md-5">
    <section class="hero mb-4 mb-md-5">
      <p class="eyebrow mb-2">BUCKS2BAR</p>
      <h1 class="display-title mb-2">Monthly Income vs Expense</h1>
      <p class="subtitle mb-0">Enter values for Jan to Dec in the Data tab. The Chart tab updates instantly.</p>
    </section>

    <section class="panel card border-0 shadow-sm">
      <div class="card-body p-3 p-md-4">
        <form id="username-form" class="username-form mb-4" novalidate>
          <label for="username" class="form-label username-label">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            class="form-control username-input"
            minlength="5"
            pattern="(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{5,}"
            autocomplete="username"
            aria-describedby="username-help username-feedback"
            required
          >
          <p id="username-help" class="username-help mb-2">Must be at least 5 characters and include 1 uppercase letter, 1 number, and 1 special character.</p>
          <button type="submit" class="btn username-submit">Submit</button>
          <p id="username-feedback" class="username-feedback mb-0" role="status" aria-live="polite"></p>
        </form>

        <ul class="nav nav-tabs mb-4" id="bucksTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="data-tab" data-bs-toggle="tab" data-bs-target="#data-pane" type="button" role="tab" aria-controls="data-pane" aria-selected="true">Data</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="chart-tab" data-bs-toggle="tab" data-bs-target="#chart-pane" type="button" role="tab" aria-controls="chart-pane" aria-selected="false">Chart</button>
          </li>
        </ul>

        <div class="tab-content" id="bucksTabContent">
          <div class="tab-pane fade show active" id="data-pane" role="tabpanel" aria-labelledby="data-tab" tabindex="0">
            <form id="monthly-form" novalidate>
              <div class="monthly-grid" role="table" aria-label="Monthly income and expense inputs">
                <div class="grid-head" role="rowgroup">
                  <div class="cell month" role="columnheader">Month</div>
                  <div class="cell" role="columnheader">Income</div>
                  <div class="cell" role="columnheader">Expense</div>
                </div>
                <div id="monthly-rows" role="rowgroup"></div>
              </div>
            </form>
          </div>

          <div class="tab-pane fade" id="chart-pane" role="tabpanel" aria-labelledby="chart-tab" tabindex="0">
            <!-- download button -->
                <button id="download-chart" class="btn btn-primary mb-3" aria-label="Download Chart">Download Chart</button>
            <div class="chart-wrap">
              <canvas id="incomeExpenseChart" aria-label="Bar chart showing monthly income and expenses" role="img"></canvas>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
